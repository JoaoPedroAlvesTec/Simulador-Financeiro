<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Financeiero</title>
    <!-- CSS -->
    <link rel="stylesheet" href="..\css\log_in.css">
    <!-- JavaScript -->
    <script src="script.js" defer></script>
</head>
<body>
    <div class="content">
            <div id="center_box">
                <form class="div_form">
                    <div id="div_logo">
                        <a href="Main.html">
                        <img src="..\img\logo.png" id="logo">
                        </a>
                        <p id="p_title">ACCESS YOUR ACCOUNT</p>
                    </div>
                    <div id="line"></div>
                    <div id="div_input">
                        <label for="ipt_email" id="lbl_form">E-MAIL</label>
                        <input type="email" id="ipt_email" placeholder="E-MAIL">

                        <label for="ipt_password" id="lbl_form">SENHA</label>
                        <input type="password" id="ipt_password" placeholder="SENHA">
                    </div>

                    <button type="submit" id="btn_login">ENTRAR</button>
                    <div id="div_text">
                        <p id="p_sign_up"> <span style="color: white">Don't have an account? </span><span style="text-decoration: underline; color: rgb(12 123 28);">Sign up for mypocket </span></p>
                    </div>
                </form>
            </div>
    </div>
</body>

</html>
