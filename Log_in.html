<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Financeiero</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/log_in.css">
    <!-- JavaScript -->
    <script src="script.js" defer></script>
</head>

<body>
    <div class="content">
        <main>
            <div id="center_box">
                <form class="div_form"> 
                    <h2 id="title">ACCESS YOUR ACCOUNT</h2>
                    <div id="line"></div>
                    
                    <label for="ipt_email" id="lbl_form">E-MAIL</label>

                    <input type="email" id="ipt_email" placeholder="E-MAIL"><br>

                    <label for="ipt_password" id="lbl_form">E-MAIL</label>
                    <input type="password" id="ipt_password" placeholder="SENHA"><br>


                    <button type="submit" id="btn_login">ENTRAR</button>
                    <p id="p_sign_up">Don't have an account? <span style="text-decoration: underline;" >Sign up for mypocket </span></p>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
